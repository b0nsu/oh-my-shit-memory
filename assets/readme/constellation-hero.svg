<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">oh-my-shit-memory constellation hero</title>
  <desc id="desc">Night sky gradient with connected constellation nodes representing runtime instrumentation pipeline.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050816"/>
      <stop offset="50%" stop-color="#0b1c3d"/>
      <stop offset="100%" stop-color="#22134f"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#b7c8ff" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#b7c8ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="7"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <g opacity="0.35" fill="#d7e2ff">
    <circle cx="86" cy="74" r="1.2"/><circle cx="168" cy="110" r="1"/><circle cx="230" cy="56" r="1.3"/>
    <circle cx="310" cy="124" r="1.1"/><circle cx="378" cy="84" r="1.2"/><circle cx="460" cy="50" r="1"/>
    <circle cx="520" cy="118" r="1.1"/><circle cx="614" cy="76" r="1.3"/><circle cx="700" cy="40" r="1"/>
    <circle cx="760" cy="104" r="1.2"/><circle cx="842" cy="62" r="1.1"/><circle cx="934" cy="92" r="1"/>
    <circle cx="1020" cy="48" r="1.2"/><circle cx="1120" cy="102" r="1.1"/><circle cx="1084" cy="188" r="1"/>
    <circle cx="990" cy="158" r="1.2"/><circle cx="884" cy="176" r="1.1"/><circle cx="808" cy="214" r="1"/>
  </g>

  <g stroke="#8fb3ff" stroke-opacity="0.55" stroke-width="2">
    <path d="M150 400 L285 318 L430 372 L580 275 L730 336 L890 250 L1040 304" fill="none"/>
    <path d="M285 318 L330 220 L470 205 L580 275" fill="none"/>
    <path d="M730 336 L780 430 L930 448 L1040 304" fill="none"/>
  </g>

  <g fill="#dbe6ff">
    <circle cx="150" cy="400" r="6"/><circle cx="285" cy="318" r="8"/><circle cx="430" cy="372" r="7"/>
    <circle cx="580" cy="275" r="9"/><circle cx="730" cy="336" r="7"/><circle cx="890" cy="250" r="8"/>
    <circle cx="1040" cy="304" r="7"/><circle cx="330" cy="220" r="5"/><circle cx="470" cy="205" r="6"/>
    <circle cx="780" cy="430" r="5"/><circle cx="930" cy="448" r="6"/>
  </g>

  <g fill="url(#glow)" filter="url(#soft)">
    <circle cx="580" cy="275" r="62"/>
    <circle cx="890" cy="250" r="52"/>
    <circle cx="285" cy="318" r="46"/>
