<svg width="1200" height="820" viewBox="0 0 1200 820" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Constellation information map</title>
  <desc id="desc">Three constellations map to collection, analysis and orchestration components.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050914"/>
      <stop offset="100%" stop-color="#101f45"/>
    </linearGradient>
    <style>
      .title { font: 700 36px Inter, Pretendard, sans-serif; fill: #ecf2ff; }
      .sub { font: 500 18px Inter, Pretendard, sans-serif; fill: #b8c7f4; }
      .label { font: 600 17px Inter, Pretendard, sans-serif; fill: #dce6ff; }
      .small { font: 14px JetBrains Mono, monospace; fill: #9fb5eb; }
      .line { stroke: #86a9ff; stroke-opacity: .55; stroke-width: 2; fill: none; }
      .node { fill: #dce7ff; }
    </style>
  </defs>

  <rect width="1200" height="820" fill="url(#bg)"/>

  <text x="70" y="85" class="title">README Constellation Blueprint</text>
  <text x="70" y="120" class="sub">Map product capabilities as star systems: Observe → Diagnose → Orchestrate</text>

  <g transform="translate(80,170)">
    <text x="0" y="0" class="label">1) OBSERVER CONSTELLATION</text>
    <text x="0" y="28" class="small">Runtime samples · RSS/VSZ/CPU/IO/Thread · Process tree</text>
    <path class="line" d="M20 90 L150 50 L280 95 L410 40 L520 100"/>
    <circle class="node" cx="20" cy="90" r="6"/><circle class="node" cx="150" cy="50" r="7"/><circle class="node" cx="280" cy="95" r="6"/><circle class="node" cx="410" cy="40" r="8"/><circle class="node" cx="520" cy="100" r="6"/>
    <text class="small" x="0" y="132">hook start</text><text class="small" x="132" y="31">sampler</text><text class="small" x="256" y="126">watchdog</text><text class="small" x="387" y="22">snapshot</text><text class="small" x="503" y="132">artifact</text>
  </g>

  <g transform="translate(80,410)">
    <text x="0" y="0" class="label">2) TRIAGE CONSTELLATION</text>
    <text x="0" y="28" class="small">Crash pointers · Symbol references · JSON/Markdown incident output</text>
    <path class="line" d="M20 90 L120 150 L240 80 L350 145 L500 78 L590 138"/>
    <circle class="node" cx="20" cy="90" r="6"/><circle class="node" cx="120" cy="150" r="7"/><circle class="node" cx="240" cy="80" r="6"/><circle class="node" cx="350" cy="145" r="7"/><circle class="node" cx="500" cy="78" r="8"/><circle class="node" cx="590" cy="138" r="6"/>
    <text class="small" x="0" y="183">crash hint</text><text class="small" x="103" y="179">symbol map</text><text class="small" x="214" y="63">parser</text><text class="small" x="331" y="176">severity</text><text class="small" x="474" y="61">summary</text><text class="small" x="563" y="170">report</text>
  </g>

  <g transform="translate(740,220)">
    <text x="0" y="0" class="label">3) ORCHESTRATOR CONSTELLATION</text>
    <text x="0" y="28" class="small">OpenCode hook lifecycle integration · CI artifact flow</text>
    <path class="line" d="M25 70 L150 120 L260 55 L370 130 L470 60"/>
    <circle class="node" cx="25" cy="70" r="6"/><circle class="node" cx="150" cy="120" r="7"/><circle class="node" cx="260" cy="55" r="8"/><circle class="node" cx="370" cy="130" r="7"/><circle class="node" cx="470" cy="60" r="6"/>
    <text class="small" x="0" y="154">pre-hook</text><text class="small" x="130" y="152">mcp</text><text class="small" x="233" y="38">orchestrate</text><text class="small" x="348" y="163">ci upload</text><text class="small" x="447" y="43">issue flow</text>
  </g>

  <rect x="738" y="470" width="390" height="220" rx="14" fill="#0e1a36" stroke="#3d5ea8" stroke-opacity="0.7"/>
  <text x="766" y="510" class="label">README Image Set</text>
  <text x="766" y="545" class="small">A. Hero banner (1200x630)</text>
  <text x="766" y="575" class="small">B. Constellation capability map</text>
  <text x="766" y="605" class="small">C. Incident card mockups (JSON + MD)</text>
  <text x="766" y="635" class="small">D. CI trail timeline strip</text>
  <text x="766" y="665" class="small">E. Prompt snippets for consistent style</text>
</svg>
